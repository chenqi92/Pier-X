name: Release

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force release at current package.json version (skip change detection)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  detect-and-prepare:
    name: Detect version change
    runs-on: ubuntu-22.04
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
      version: ${{ steps.decide.outputs.version }}
      tag: ${{ steps.decide.outputs.tag }}
      prerelease: ${{ steps.decide.outputs.prerelease }}
      changelog: ${{ steps.decide.outputs.changelog }}
    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether to release
        id: decide
        shell: bash
        run: |
          set -euo pipefail

          curr="$(jq -r '.version' package.json)"
          if [ -z "$curr" ] || [ "$curr" = "null" ]; then
            echo "package.json has no .version"
            exit 1
          fi
          tag="v$curr"

          force="${{ github.event.inputs.force }}"
          should_release="false"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "$force" = "true" ]; then
            echo "manual dispatch with force=true"
            should_release="true"
          else
            base="${{ github.event.before }}"
            if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
              echo "no usable base sha — treating as version change"
              should_release="true"
            else
              git fetch --depth=1 origin "$base" 2>/dev/null || true
              prev="$(git show "$base:package.json" 2>/dev/null | jq -r '.version' || true)"
              echo "previous=$prev current=$curr"
              if [ "$prev" != "$curr" ] && [ -n "$prev" ] && [ "$prev" != "null" ]; then
                should_release="true"
              fi
            fi
          fi

          if [ "$should_release" = "true" ] && git rev-parse "$tag" >/dev/null 2>&1; then
            echo "tag $tag already exists; skipping release"
            should_release="false"
          fi

          prerelease="false"
          case "$tag" in *-rc.*|*-beta*|*-alpha*) prerelease="true" ;; esac

          prev_tag="$(git tag --list 'v*' --sort=-v:refname | head -n 1 || true)"
          if [ -n "$prev_tag" ]; then
            range="$prev_tag..HEAD"
          else
            range="HEAD"
          fi
          changelog="$(git log "$range" --pretty=format:'- %s (%h)' --no-merges || true)"
          if [ -z "$changelog" ]; then
            changelog="- (no commits since previous release)"
          fi

          {
            echo "should_release=$should_release"
            echo "version=$curr"
            echo "tag=$tag"
            echo "prerelease=$prerelease"
            echo "changelog<<__CHANGELOG_EOF__"
            echo "$changelog"
            echo "__CHANGELOG_EOF__"
          } >> "$GITHUB_OUTPUT"

  publish-linux:
    name: Publish Linux bundles
    needs: detect-and-prepare
    if: needs.detect-and-prepare.outputs.should_release == 'true'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITEA_TOKEN || github.token }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf \
            file \
            curl \
            jq

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundles
        run: npm run tauri -- build --ci

      - name: Collect release artifacts
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_DIR="target/release/bundle"
          mkdir -p dist-assets
          # Tauri emits .deb, .rpm, and .AppImage for Linux bundles.
          find "$BUNDLE_DIR" -type f \
            \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \) \
            -exec cp {} dist-assets/ \;
          echo "---- collected ----"
          ls -lh dist-assets

      - name: Push release tag
        shell: bash
        env:
          TAG: ${{ needs.detect-and-prepare.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "${GITHUB_ACTOR:-gitea-actions}"
          git config user.email "${GITHUB_ACTOR:-gitea-actions}@users.noreply.gitea"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tag $TAG already exists locally"
          else
            git tag -a "$TAG" -m "Pier-X $TAG"
          fi
          git push origin "$TAG"

      - name: Publish to Gitea Release
        shell: bash
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN || github.token }}
          GITEA_SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.detect-and-prepare.outputs.tag }}
          PRERELEASE: ${{ needs.detect-and-prepare.outputs.prerelease }}
          CHANGELOG: ${{ needs.detect-and-prepare.outputs.changelog }}
        run: |
          set -euo pipefail
          api="$GITEA_SERVER_URL/api/v1"
          auth="Authorization: token $GITEA_TOKEN"

          body_md="$(printf '## What'\''s changed\n\n%s\n\n---\nDownload the platform-specific bundle below to install.\n' "$CHANGELOG")"

          # 1. Find or create the release for this tag.
          rel="$(curl -sS -H "$auth" "$api/repos/$REPO/releases/tags/$TAG" || true)"
          rid="$(echo "$rel" | jq -r '.id // empty')"
          if [ -z "$rid" ]; then
            payload="$(jq -n \
              --arg tag "$TAG" \
              --arg name "Pier-X $TAG" \
              --arg body "$body_md" \
              --argjson pre "$PRERELEASE" \
              '{tag_name:$tag, name:$name, body:$body, draft:false, prerelease:$pre}')"
            rel="$(curl -sS -X POST -H "$auth" -H "Content-Type: application/json" \
              -d "$payload" "$api/repos/$REPO/releases")"
            rid="$(echo "$rel" | jq -r '.id')"
          fi
          echo "release id: $rid"

          # 2. Upload each asset; replace any asset that already exists
          #    for this tag so reruns overwrite stale bundles.
          for f in dist-assets/*; do
            [ -e "$f" ] || continue
            name="$(basename "$f")"
            existing="$(echo "$rel" | jq -r --arg n "$name" '.assets[]? | select(.name==$n) | .id')"
            if [ -n "$existing" ]; then
              echo "replacing existing asset $name ($existing)"
              curl -sS -X DELETE -H "$auth" \
                "$api/repos/$REPO/releases/$rid/assets/$existing" > /dev/null || true
            fi
            echo "uploading $name ..."
            curl -sS -X POST -H "$auth" \
              -F "attachment=@$f" \
              "$api/repos/$REPO/releases/$rid/assets?name=$name" > /dev/null
          done
          echo "done."
