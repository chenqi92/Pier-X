name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt into Node.js 24 for JavaScript-based actions, ahead of the
  # 2026-09-16 deprecation deadline.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  qt-build:
    name: Qt build · ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            qt-host: windows
            qt-arch: win64_msvc2022_64
            cmake-extra: ''
          - name: macOS Universal
            os: macos-latest
            qt-host: mac
            qt-arch: clang_64
            cmake-extra: '-DCMAKE_OSX_ARCHITECTURES=arm64;x86_64'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Install Qt 6.8 LTS
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.1'
          host: ${{ matrix.qt-host }}
          target: 'desktop'
          arch: ${{ matrix.qt-arch }}
          modules: 'qtshadertools'
          cache: true

      - name: Configure (CMake)
        shell: bash
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake-extra }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Show build artifacts
        shell: bash
        run: |
          echo "Pier-X version: ${{ steps.version.outputs.version }}"
          find build -maxdepth 4 -type f \( -name 'pier-x' -o -name 'pier-x.exe' \) -print || true
          find build -maxdepth 4 -type d -name 'pier-x.app' -print || true
          # On macOS, verify the binary is actually universal
          if [ "${{ runner.os }}" = "macOS" ]; then
            lipo -info build/pier-ui-qt/pier-x.app/Contents/MacOS/pier-x || true
          fi

  rust-core:
    name: Rust core · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pier-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('pier-core/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        working-directory: pier-core
        run: cargo fmt --all --check

      - name: cargo clippy
        working-directory: pier-core
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo build
        working-directory: pier-core
        run: cargo build --release

      - name: cargo test
        working-directory: pier-core
        run: cargo test --release
