name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  detect-version-change:
    name: Detect version change
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Compare package.json version against parent
        id: check
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual dispatch — treating as changed"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "no usable base sha — treating as changed"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch --depth=1 origin "$base" 2>/dev/null || true
          prev="$(git show "$base:package.json" 2>/dev/null | jq -r '.version' || true)"
          curr="$(jq -r '.version' package.json)"
          echo "previous=$prev"
          echo "current=$curr"
          if [ "$prev" != "$curr" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  tauri-shell:
    name: Tauri shell · ${{ matrix.name }}
    needs: detect-version-change
    if: needs.detect-version-change.outputs.changed == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
          - name: macOS
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri shell (no bundle)
        run: npm run tauri -- build --ci --no-bundle

      - name: Show build artifacts
        shell: bash
        run: |
          find target -maxdepth 4 -type f \
            \( -name 'pierx' -o -name 'pierx.exe' -o -name 'Pier-X' -o -name 'Pier-X.exe' \) \
            -print || true

  rust-core:
    name: Rust core · ${{ matrix.os }}
    needs: detect-version-change
    if: needs.detect-version-change.outputs.changed == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.toml', 'pier-core/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt -p pier-core --check

      - name: cargo clippy
        run: cargo clippy -p pier-core --all-targets -- -D warnings

      - name: cargo build
        run: cargo build -p pier-core --release

      - name: cargo test
        run: cargo test -p pier-core --release
