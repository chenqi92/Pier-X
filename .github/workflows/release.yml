name: Release

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force release at current package.json version (skip change detection)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  detect-and-prepare:
    name: Detect version change
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
      version: ${{ steps.decide.outputs.version }}
      tag: ${{ steps.decide.outputs.tag }}
      prerelease: ${{ steps.decide.outputs.prerelease }}
      changelog: ${{ steps.decide.outputs.changelog }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Decide whether to release
        id: decide
        shell: bash
        run: |
          set -euo pipefail

          curr="$(jq -r '.version' package.json)"
          if [ -z "$curr" ] || [ "$curr" = "null" ]; then
            echo "package.json has no .version"
            exit 1
          fi
          tag="v$curr"

          force="${{ github.event.inputs.force }}"
          should_release="false"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "$force" = "true" ]; then
            echo "manual dispatch with force=true"
            should_release="true"
          else
            base="${{ github.event.before }}"
            if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
              echo "no usable base sha — treating as version change"
              should_release="true"
            else
              git fetch --depth=1 origin "$base" 2>/dev/null || true
              prev="$(git show "$base:package.json" 2>/dev/null | jq -r '.version' || true)"
              echo "previous=$prev current=$curr"
              if [ "$prev" != "$curr" ] && [ -n "$prev" ] && [ "$prev" != "null" ]; then
                should_release="true"
              fi
            fi
          fi

          if [ "$should_release" = "true" ] && git rev-parse "$tag" >/dev/null 2>&1; then
            echo "tag $tag already exists; skipping release"
            should_release="false"
          fi

          prerelease="false"
          case "$tag" in *-rc.*|*-beta*|*-alpha*) prerelease="true" ;; esac

          prev_tag="$(git tag --list 'v*' --sort=-v:refname | head -n 1 || true)"
          if [ -n "$prev_tag" ]; then
            range="$prev_tag..HEAD"
          else
            range="HEAD"
          fi
          changelog="$(git log "$range" --pretty=format:'- %s (%h)' --no-merges || true)"
          if [ -z "$changelog" ]; then
            changelog="- (no commits since previous release)"
          fi

          {
            echo "should_release=$should_release"
            echo "version=$curr"
            echo "tag=$tag"
            echo "prerelease=$prerelease"
            echo "changelog<<__CHANGELOG_EOF__"
            echo "$changelog"
            echo "__CHANGELOG_EOF__"
          } >> "$GITHUB_OUTPUT"

  publish-tauri:
    name: Publish · ${{ matrix.name }}
    needs: detect-and-prepare
    if: needs.detect-and-prepare.outputs.should_release == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-22.04
            args: --ci
          - name: Windows x64
            os: windows-latest
            args: --ci
          - name: Windows ARM64
            os: windows-11-arm
            args: --ci
          - name: macOS Universal
            os: macos-latest
            args: --ci --target universal-apple-darwin
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS universal targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf \
            file

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri bundles
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: ${{ needs.detect-and-prepare.outputs.tag }}
          releaseName: Pier-X ${{ needs.detect-and-prepare.outputs.tag }}
          releaseBody: |
            ## What's changed

            ${{ needs.detect-and-prepare.outputs.changelog }}

            ---
            Download the platform-specific bundle below to install.
          releaseDraft: false
          prerelease: ${{ needs.detect-and-prepare.outputs.prerelease == 'true' }}
          args: ${{ matrix.args }}
