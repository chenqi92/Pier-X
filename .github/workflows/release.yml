name: Release

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force release at current package.json version (skip change detection)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  detect-and-prepare:
    name: Detect version change
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
      version: ${{ steps.decide.outputs.version }}
      tag: ${{ steps.decide.outputs.tag }}
      prerelease: ${{ steps.decide.outputs.prerelease }}
      changelog: ${{ steps.decide.outputs.changelog }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Decide whether to release
        id: decide
        shell: bash
        run: |
          set -euo pipefail

          curr="$(jq -r '.version' package.json)"
          if [ -z "$curr" ] || [ "$curr" = "null" ]; then
            echo "package.json has no .version"
            exit 1
          fi
          tag="v$curr"

          force="${{ github.event.inputs.force }}"
          should_release="false"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "$force" = "true" ]; then
            echo "manual dispatch with force=true"
            should_release="true"
          else
            base="${{ github.event.before }}"
            if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
              echo "no usable base sha — treating as version change"
              should_release="true"
            else
              git fetch --depth=1 origin "$base" 2>/dev/null || true
              prev="$(git show "$base:package.json" 2>/dev/null | jq -r '.version' || true)"
              echo "previous=$prev current=$curr"
              if [ "$prev" != "$curr" ] && [ -n "$prev" ] && [ "$prev" != "null" ]; then
                should_release="true"
              fi
            fi
          fi

          if [ "$should_release" = "true" ] && git rev-parse "$tag" >/dev/null 2>&1; then
            echo "tag $tag already exists; skipping release"
            should_release="false"
          fi

          prerelease="false"
          case "$tag" in *-rc.*|*-beta*|*-alpha*) prerelease="true" ;; esac

          prev_tag="$(git tag --list 'v*' --sort=-v:refname | head -n 1 || true)"
          if [ -n "$prev_tag" ]; then
            range="$prev_tag..HEAD"
          else
            range="HEAD"
          fi
          changelog="$(git log "$range" --pretty=format:'- %s (%h)' --no-merges || true)"
          if [ -z "$changelog" ]; then
            changelog="- (no commits since previous release)"
          fi

          {
            echo "should_release=$should_release"
            echo "version=$curr"
            echo "tag=$tag"
            echo "prerelease=$prerelease"
            echo "changelog<<__CHANGELOG_EOF__"
            echo "$changelog"
            echo "__CHANGELOG_EOF__"
          } >> "$GITHUB_OUTPUT"

  publish-tauri:
    name: Publish · ${{ matrix.name }}
    needs: detect-and-prepare
    if: needs.detect-and-prepare.outputs.should_release == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-22.04
            args: --ci
          - name: Windows x64
            os: windows-latest
            args: --ci
          - name: Windows ARM64
            os: windows-11-arm
            args: --ci
          - name: macOS Universal
            os: macos-latest
            args: --ci --target universal-apple-darwin
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS universal targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf \
            file

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri bundles
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: ${{ needs.detect-and-prepare.outputs.tag }}
          releaseName: Pier-X ${{ needs.detect-and-prepare.outputs.tag }}
          releaseBody: |
            ## What's changed

            ${{ needs.detect-and-prepare.outputs.changelog }}

            ---
            Download the platform-specific bundle below to install.
          releaseDraft: false
          prerelease: ${{ needs.detect-and-prepare.outputs.prerelease == 'true' }}
          args: ${{ matrix.args }}

  package-manager-metadata:
    name: Publish package-manager metadata
    needs:
      - detect-and-prepare
      - publish-tauri
    if: needs.detect-and-prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      HOMEBREW_TAP_REPOSITORY: chenqi92/homebrew-tap
      WINGET_FORK_REPOSITORY: chenqi92/winget-pkgs
      WINGET_UPSTREAM_REPOSITORY: microsoft/winget-pkgs
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      WINGET_PKGS_TOKEN: ${{ secrets.WINGET_PKGS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.detect-and-prepare.outputs.tag }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          mkdir -p release-assets
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "Pier-X_${version}_universal.dmg" \
            --pattern "Pier-X_${version}_amd64.AppImage" \
            --pattern "Pier-X_${version}_x64-setup.exe" \
            --pattern "Pier-X_${version}_arm64-setup.exe" \
            --dir release-assets
          ls -lh release-assets

      - name: Generate package-manager metadata
        shell: bash
        env:
          TAG: ${{ needs.detect-and-prepare.outputs.tag }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          npm run release:package-managers -- \
            --version "$version" \
            --repo "$GITHUB_REPOSITORY" \
            --assets-dir release-assets \
            --out-dir dist-package-managers

      - name: Package metadata assets
        shell: bash
        env:
          TAG: ${{ needs.detect-and-prepare.outputs.tag }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          cp dist-package-managers/homebrew/Casks/pier-x.rb "pier-x-homebrew-cask-v${version}.rb"
          cp dist-package-managers/homebrew/Formula/pier-x.rb "pier-x-homebrew-formula-v${version}.rb"
          cp dist-package-managers/SHA256SUMS.txt "pier-x-release-sha256-v${version}.txt"
          tar -czf "pier-x-winget-manifests-v${version}.tar.gz" -C dist-package-managers winget
          find dist-package-managers -type f -print

      - name: Upload package-manager metadata
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.detect-and-prepare.outputs.tag }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          gh release upload "$TAG" \
            "pier-x-homebrew-cask-v${version}.rb" \
            "pier-x-homebrew-formula-v${version}.rb" \
            "pier-x-winget-manifests-v${version}.tar.gz" \
            "pier-x-release-sha256-v${version}.txt" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

      - name: Checkout Homebrew tap
        if: env.HOMEBREW_TAP_TOKEN != ''
        uses: actions/checkout@v6
        with:
          repository: ${{ env.HOMEBREW_TAP_REPOSITORY }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Publish Homebrew tap
        if: env.HOMEBREW_TAP_TOKEN != ''
        shell: bash
        env:
          TAG: ${{ needs.detect-and-prepare.outputs.tag }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          mkdir -p homebrew-tap/Casks homebrew-tap/Formula
          cp dist-package-managers/homebrew/Casks/pier-x.rb homebrew-tap/Casks/pier-x.rb
          cp dist-package-managers/homebrew/Formula/pier-x.rb homebrew-tap/Formula/pier-x.rb
          rm -f homebrew-tap/Casks/.gitkeep homebrew-tap/Formula/.gitkeep

          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks Formula
          if git diff --cached --quiet; then
            echo "Homebrew tap is already up to date for v${version}."
            exit 0
          fi
          git commit -m "Update Pier-X to v${version}"
          git push

      - name: Skip Homebrew tap publish
        if: env.HOMEBREW_TAP_TOKEN == ''
        run: echo "HOMEBREW_TAP_TOKEN is not configured; skipping Homebrew tap publish."

      - name: Checkout WinGet fork
        if: env.WINGET_PKGS_TOKEN != ''
        uses: actions/checkout@v6
        with:
          repository: ${{ env.WINGET_FORK_REPOSITORY }}
          token: ${{ secrets.WINGET_PKGS_TOKEN }}
          path: winget-pkgs

      - name: Update WinGet fork
        if: env.WINGET_PKGS_TOKEN != ''
        id: update-winget
        shell: bash
        env:
          TAG: ${{ needs.detect-and-prepare.outputs.tag }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          branch="pier-x-v${version}"
          manifest_dir="manifests/c/Chenqi92/PierX/${version}"

          cd winget-pkgs
          git checkout -B "$branch"
          rm -rf "$manifest_dir"
          mkdir -p "$(dirname "$manifest_dir")"
          cp -R "../dist-package-managers/winget/${manifest_dir}" "$manifest_dir"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$manifest_dir"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "WinGet fork already has Chenqi92.PierX ${version}."
            exit 0
          fi

          git commit -m "New version: Chenqi92.PierX version ${version}"
          git push --force-with-lease origin "$branch"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open WinGet pull request
        if: env.WINGET_PKGS_TOKEN != '' && steps.update-winget.outputs.changed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.WINGET_PKGS_TOKEN }}
          TAG: ${{ needs.detect-and-prepare.outputs.tag }}
          BRANCH: ${{ steps.update-winget.outputs.branch }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          existing="$(gh pr list \
            --repo "$WINGET_UPSTREAM_REPOSITORY" \
            --head "chenqi92:${BRANCH}" \
            --state open \
            --json url \
            --jq '.[0].url // empty')"
          if [ -n "$existing" ]; then
            echo "WinGet PR already exists: $existing"
            exit 0
          fi

          gh pr create \
            --repo "$WINGET_UPSTREAM_REPOSITORY" \
            --base master \
            --head "chenqi92:${BRANCH}" \
            --title "New version: Chenqi92.PierX version ${version}" \
            --body "Updates Chenqi92.PierX to ${version}. Generated from ${GITHUB_REPOSITORY}@${TAG} release assets."

      - name: Skip WinGet PR
        if: env.WINGET_PKGS_TOKEN == ''
        run: echo "WINGET_PKGS_TOKEN is not configured; skipping WinGet fork update and pull request."
