name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || inputs.tag || github.ref }}
  cancel-in-progress: true

jobs:
  publish-gpui:
    name: Publish · ${{ matrix.name }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            archive_name: pier-x-windows-x64.zip
            binary_path: target/release/pier-ui-gpui.exe
          - name: macOS
            os: macos-latest
            archive_name: pier-x-macos.zip
            binary_path: target/release/pier-ui-gpui
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build GPUI shell
        run: cargo build -p pier-ui-gpui --release

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -LiteralPath "${{ matrix.binary_path }}" -DestinationPath "dist\\${{ matrix.archive_name }}" -Force

      - name: Package macOS binary
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist
          ditto -c -k "${{ matrix.binary_path }}" "dist/${{ matrix.archive_name }}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: dist/${{ matrix.archive_name }}
