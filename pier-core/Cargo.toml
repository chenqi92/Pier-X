[package]
name = "pier-core"
version = "0.1.0"
edition = "2021"
description = "Cross-platform core engine for Pier-X — terminal, SSH, RDP, VNC, databases"
license = "MIT"
repository = "https://github.com/chenqi92/Pier-X"

[lib]
name = "pier_core"
crate-type = ["staticlib", "rlib"]

[dependencies]
# Error handling
thiserror = "2"
anyhow = "1"

# Logging
log = "0.4"

# Serialization (for config / IPC)
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Cross-platform credential storage
keyring = "3"

# Cross-platform paths
directories = "5"

# Terminal emulation — VT100 / ANSI parser (cross-platform, pure Rust)
vte = "0.15"

# Unix PTY — forkpty + ioctl wrappers live in libc. Only pulled in on
# Unix targets; Windows gets its own ConPTY-backed implementation
# (stub for now). Once the Unix impl needs safer wrappers the `nix`
# crate slots in here.
[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
env_logger = "0.11"
