[package]
name = "pier-core"
version = "0.1.0"
edition = "2021"
description = "Cross-platform core engine for Pier-X — terminal, SSH, RDP, VNC, databases"
license = "MIT"
repository = "https://github.com/chenqi92/Pier-X"

[lib]
name = "pier_core"
crate-type = ["staticlib", "rlib"]

[dependencies]
# Error handling
thiserror = "2"
anyhow = "1"

# Logging
log = "0.4"

# Serialization (for config / IPC)
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Cross-platform credential storage
keyring = "3"

# Cross-platform paths
directories = "5"

[dev-dependencies]
env_logger = "0.11"
