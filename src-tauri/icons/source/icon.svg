<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="920" y2="944" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#08131F"/>
      <stop offset="55%" stop-color="#0B1730"/>
      <stop offset="100%" stop-color="#160D28"/>
    </linearGradient>

    <linearGradient id="textGrad" x1="210" y1="380" x2="820" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7DFBFF"/>
      <stop offset="42%" stop-color="#2EDCFF"/>
      <stop offset="72%" stop-color="#5C7CFF"/>
      <stop offset="100%" stop-color="#C96BFF"/>
    </linearGradient>

    <linearGradient id="promptGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A5FFFF"/>
      <stop offset="100%" stop-color="#39DFFF"/>
    </linearGradient>

    <linearGradient id="xGrad" x1="650" y1="470" x2="820" y2="650" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#74F7FF"/>
      <stop offset="50%" stop-color="#5A7FFF"/>
      <stop offset="100%" stop-color="#D26CFF"/>
    </linearGradient>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(512 512) rotate(90) scale(420)">
      <stop offset="0%" stop-color="#244CFF" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#244CFF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="220" fill="url(#glow)"/>

  <g filter="url(#softGlow)" opacity="0.96">
    <path
      d="M250 290 L340 360 L250 430"
      stroke="url(#promptGrad)"
      stroke-width="22"
      stroke-linecap="round"
      stroke-linejoin="round"/>
    <path
      d="M385 446 H485"
      stroke="url(#promptGrad)"
      stroke-width="22"
      stroke-linecap="round"/>
  </g>

  <text
    x="210"
    y="650"
    fill="url(#textGrad)"
    font-size="170"
    font-weight="700"
    font-family="JetBrains Mono, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
    letter-spacing="-4"
    filter="url(#softGlow)">pier-</text>

  <text
    x="690"
    y="650"
    fill="url(#xGrad)"
    font-size="185"
    font-weight="800"
    font-family="JetBrains Mono, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
    letter-spacing="-6"
    filter="url(#softGlow)">x</text>

  <rect x="795" y="675" width="18" height="52" rx="6" fill="#7BF8FF" opacity="0.9"/>
</svg>
